<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background-color: #0f0f0f; /* dark bg looks way better for a clock */
}

.box {
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px; /* pill/card shape instead of circle — fits time text better */
    width: 380px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    box-shadow: 0 0 40px rgba(0, 200, 255, 0.15), 0 0 80px rgba(0, 200, 255, 0.05);
}

h2 {
    letter-spacing: 8px;
    font-family: 'Courier New', Courier, monospace; /* monospace = clock vibes */
    font-size: 2.3rem;
    color: #00e5ff;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.6), 0 0 30px rgba(0, 229, 255, 0.3);
    margin: 0;
}
        
    </style>
</head>
<body>
    <div class="box">
         <h2 id="time">Hello!</h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
